name: Release
 
on:
  push:
    branches:
      - main
      - test/release-test
    
permissions:
  contents: write
  
jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
 
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot dpkg libarchive-tools
 
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
 
      - name: Build packages
        run: pnpm -r run build
 
      - name: Build electron app
        run: pnpm dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Runner Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-build-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
            release/*.deb
            release/*.blockmap
          if-no-files-found: error

  publish:
    name: Create Unified Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download All Runner Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: electron-build-*
          merge-multiple: true

      - name: Publish Consolidated GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ github.run_number }}
          name: Markdown Reader Release ${{ github.run_number }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-artifacts/*.exe
            release-artifacts/*.dmg
            release-artifacts/*.AppImage
            release-artifacts/*.deb
            release-artifacts/*.blockmap
