name: Release
 
on:
  push:
    branches:  
      - main
    tags:
      - "v*"
    
permissions:
  contents: write
  packages: write
  pull-requests: write
  actions: write
  
jobs:
  release:
    name: Build & Publish (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
 
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
 
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
 
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
 
      - name: Build packages
        run: pnpm -r run build
 
      - name: Build and publish
        run: pnpm dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
 