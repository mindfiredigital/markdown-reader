name: CI
 
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
 
jobs:
  build:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout 
        uses: actions/checkout@v4
 
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
 
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
 
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r run build
 
      - name: Typecheck
        run: pnpm typecheck
 
      - name: Run lint
        run: pnpm lint
 
      - name: Run test
        run: pnpm test:coverage

      - name: Build Electron app
        run: pnpm dist